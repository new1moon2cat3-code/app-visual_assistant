<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI視覺輔助系統</title>

<style>
body{
    background:black;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    font-size:36px;
    margin-bottom:20px;
}

video{
    width:95%;
    max-width:500px;
    border:4px solid yellow;
    border-radius:20px;
    margin-bottom:20px;
}

button{
    width:90%;
    max-width:500px;
    font-size:30px;
    padding:25px;
    margin:15px 0;
    border:none;
    border-radius:20px;
    background:yellow;
    color:black;
    font-weight:bold;
}

button:active{
    background:orange;
}

input{
    width:90%;
    max-width:500px;
    font-size:22px;
    padding:15px;
    border-radius:10px;
    border:none;
    margin-bottom:20px;
}

#result{
    margin-top:20px;
    font-size:28px;
    color:#00ffcc;
    line-height:1.5;
    padding:10px;
}
</style>
</head>

<body>

<h1>AI視覺輔助系統</h1>

<input type="password" id="apiKey" placeholder="請輸入 Gemini API Key">

<br>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="startCamera()">📷 開啟相機</button>

<button onclick="analyzeImage()">🧠 AI辨識環境</button>

<button onclick="startRecognition()">🎤 語音輸入</button>

<button onclick="readResult()">🔊 朗讀結果</button>

<div id="result">系統尚未開始</div>

<script>

const video = document.getElementById("video");
const resultDiv = document.getElementById("result");

// ===== 語音朗讀 =====
function speak(text){
    speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);

    utterance.lang = "zh-TW";
    utterance.rate = 1;
    utterance.pitch = 1;

    speechSynthesis.speak(utterance);
}

// ===== 頁面啟動 =====
window.onload = function(){
    speak("歡迎使用AI視覺輔助系統");
}

// ===== 開啟相機 =====
async function startCamera(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            },
            audio:false
        });

        video.srcObject = stream;

        resultDiv.innerText = "相機已開啟";

        speak("相機已開啟");

    }catch(error){

        console.error(error);

        resultDiv.innerText = "無法開啟相機";

        speak("無法開啟相機");
    }
}

// ===== 擷取畫面 =====
function captureImage(){

    const canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(video,0,0);

    return canvas.toDataURL("image/jpeg");
}

// ===== Gemini Vision API =====
async function analyzeImage(){

    const apiKey = document.getElementById("apiKey").value;

    if(!apiKey){
        speak("請先輸入API Key");
        return;
    }

    if(!video.srcObject){
        speak("請先開啟相機");
        return;
    }

    resultDiv.innerText = "AI辨識中...";

    speak("正在分析環境");

    try{

        const imageBase64 = captureImage().split(",")[1];

        const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                contents:[
                    {
                        parts:[
                            {
                                text:"請協助盲人辨識畫面中的重要物件與環境，用簡短清楚中文描述。"
                            },
                            {
                                inline_data:{
                                    mime_type:"image/jpeg",
                                    data:imageBase64
                                }
                            }
                        ]
                    }
                ]
            })
        });

        const data = await response.json();

        console.log(data);

        let text = data.candidates[0].content.parts[0].text;

        resultDiv.innerText = text;

        speak(text);

    }catch(error){

        console.error(error);

        resultDiv.innerText = "AI辨識失敗";

        speak("AI辨識失敗");
    }
}

// ===== 朗讀結果 =====
function readResult(){

    speak(resultDiv.innerText);
}

// ===== 語音輸入 =====
function startRecognition(){

    if(!('webkitSpeechRecognition' in window)){

        speak("瀏覽器不支援語音輸入");

        return;
    }

    const recognition = new webkitSpeechRecognition();

    recognition.lang = "zh-TW";

    recognition.continuous = false;

    recognition.interimResults = false;

    speak("請說話");

    recognition.onresult = function(event){

        const text = event.results[0][0].transcript;

        resultDiv.innerText = "你說：" + text;

        speak("你說了" + text);
    }

    recognition.onerror = function(){

        speak("語音辨識失敗");
    }

    recognition.start();
}

</script>

</body>
</html>
