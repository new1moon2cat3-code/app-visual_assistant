<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>視覺輔助無障礙系統</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    font-size: 32px;
    margin-bottom: 20px;
}

button {
    width: 90%;
    font-size: 28px;
    padding: 25px;
    margin: 15px 0;
    border: none;
    border-radius: 15px;
    background: yellow;
    color: black;
    font-weight: bold;
}

button:active {
    background: orange;
}

#result {
    margin-top: 20px;
    font-size: 24px;
    color: #00ffcc;
}
</style>
</head>

<body>

<h1>視覺輔助無障礙系統</h1>

<button onclick="startRecognition()">🎤 語音輸入</button>
<button onclick="simulateDetect()">📷 模擬影像辨識</button>
<button onclick="readResult()">🔊 朗讀結果</button>

<div id="result">尚未開始</div>

<script>
// ===== 語音功能 =====
function speak(text){
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

// ===== 頁面進入語音提示 =====
window.onload = function(){
    speak("歡迎使用視覺輔助無障礙系統。請點擊按鈕開始操作。");
}

// ===== 模擬影像辨識 =====
function simulateDetect(){
    let resultText = "偵測結果：前方有一個人";
    document.getElementById("result").innerText = resultText;
    speak(resultText);
}

// ===== 朗讀結果 =====
function readResult(){
    let text = document.getElementById("result").innerText;
    speak(text);
}

// ===== 語音輸入 =====
function startRecognition(){
    if (!('webkitSpeechRecognition' in window)) {
        speak("你的瀏覽器不支援語音輸入");
        return;
    }

    let recognition = new webkitSpeechRecognition();
    recognition.lang = "zh-TW";
    recognition.continuous = false;
    recognition.interimResults = false;

    speak("請說話");

    recognition.onresult = function(event){
        let text = event.results[0][0].transcript;
        document.getElementById("result").innerText = "你說：" + text;
        speak("你說了" + text);
    }

    recognition.onerror = function(){
        speak("語音輸入失敗");
    }

    recognition.start();
}
</script>

</body>
</html>
